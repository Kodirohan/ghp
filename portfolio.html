    <meta charset="UTF-8">

    <title>Student Profile</title>
    <style>
        /* CSS Reset for better consistency */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* min-height is better for mobile scrolling */
            padding: 20px;
        }

        .card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* Softer, deeper shadow */
            width: 100%;
            max-width: 380px; /* Makes it responsive on small screens */
            text-align: center;
        }

        /* Added a placeholder avatar to make it look like a real profile */
        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #4A90E2, #357ABD);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0 auto 1.5rem;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        h2 { 
            color: #2c3e50; 
            margin-bottom: 2rem; 
            font-size: 1.5rem;
        }

        .info-group {
            text-align: left;
            margin-bottom: 1.2rem;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.8rem;
            display: flex;
            flex-direction: column; /* Stacks the label and value neatly */
        }

        /* Removes the unnecessary line under the very last item */
        .info-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .label {
            font-size: 0.75rem;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .value {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: 500;
        }

        /* Special layout for the grade section */
        .grade-group {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1.5rem;
        }

        .grade-group .label {
            margin-bottom: 0;
            color: #2c3e50;
        }

        .badge {
            background: #4A90E2;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.4);
        }
    </style>
</head>

    </div>
